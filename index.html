<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>E_DeckClicker</title>
  <link rel="stylesheet" href="style.css?v=0.1.0">
</head>
<body>
  <div id="version">v0.1.0</div>
  <div id="app">
    <header>
      <h1>E_DeckClicker</h1>
      <div id="stats">
        <span id="gold-display">💰 0 Gold</span>
        <span id="click-power-display">⚡ 1x Click</span>
        <span id="auto-display">🔄 0/s Auto</span>
        <span id="turn-display">🃏 Turn 1</span>
      </div>
    </header>

    <main>
      <section id="click-area">
        <button id="click-btn">CLICK!</button>
        <div id="floating-numbers"></div>
      </section>

      <section id="deck-area">
        <div id="deck-info">
          <div class="pile" id="draw-pile">
            <div class="pile-label">山札</div>
            <div class="pile-count" id="draw-count">0</div>
          </div>
          <div id="hand-area">
            <div class="hand-label">手札 <span id="hand-info"></span></div>
            <div id="hand-cards"></div>
          </div>
          <div class="pile" id="discard-pile">
            <div class="pile-label">捨て札</div>
            <div class="pile-count" id="discard-count">0</div>
          </div>
        </div>
        <div id="deck-controls">
          <button id="end-turn-btn">ターン終了 / 新しい手札を引く</button>
        </div>
      </section>

      <section id="shop-area">
        <h2>ショップ</h2>
        <div id="shop-cards"></div>
        <button id="refresh-shop-btn">ショップ更新 (無料)</button>
      </section>
    </main>
  </div>

  <script src="game.js?v=0.1.0"></script>
</body>
</html>
