<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>E_DeckClicker</title>
  <link rel="stylesheet" href="style.css?v=0.3.0">
</head>
<body>
  <div id="version">v0.3.0</div>
  <div id="app">
    <header>
      <h1>E_DeckClicker</h1>
      <div id="stats">
        <span id="wave-display">Wave 1</span>
        <span id="damage-display">⚔️ 1 dmg</span>
        <span id="defeated-display">💀 0 体撃破</span>
        <span id="ascend-count-display">🌟 0 覚醒</span>
      </div>
    </header>

    <main>
      <!-- Monster Area -->
      <section id="monster-area">
        <div id="monster-name"></div>
        <div id="hp-bar-container">
          <div id="hp-bar"></div>
          <div id="hp-text"></div>
        </div>
        <div id="monster-sprite"></div>
        <div id="floating-numbers"></div>
      </section>

      <!-- Ascend Button -->
      <section id="ascend-area">
        <button id="ascend-btn" disabled>
          <div class="ascend-title">覚醒（アセンド）</div>
          <div class="ascend-desc" id="ascend-desc">Wave 5 到達で解放</div>
        </button>
        <div id="ascend-bonuses"></div>
      </section>

      <!-- Deck Area -->
      <section id="deck-area">
        <div id="deck-info">
          <div class="pile" id="draw-pile">
            <div class="pile-label">山札</div>
            <div class="pile-count" id="draw-count">0</div>
          </div>
          <div id="hand-area">
            <div class="hand-label">手札 <span id="hand-info"></span></div>
            <div id="hand-cards"></div>
          </div>
          <div class="pile" id="discard-pile">
            <div class="pile-label">捨て札</div>
            <div class="pile-count" id="discard-count">0</div>
          </div>
        </div>
      </section>

      <!-- Reward Overlay -->
      <div id="reward-overlay" class="hidden">
        <div id="reward-box">
          <h2>報酬カードを選べ！</h2>
          <div id="reward-cards"></div>
          <button id="skip-reward-btn">スキップ</button>
        </div>
      </div>

      <!-- Ascend Overlay -->
      <div id="ascend-overlay" class="hidden">
        <div id="ascend-box">
          <h2>覚醒！</h2>
          <div id="ascend-summary"></div>
          <button id="ascend-confirm-btn">新たな旅へ</button>
        </div>
      </div>
    </main>
  </div>

  <script src="game.js?v=0.3.0"></script>
</body>
</html>
